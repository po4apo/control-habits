# Control Habits: API и бот (опционально — PostgreSQL в контейнере).
# Секреты задаются через .env или переменные окружения (не коммитить .env с прод-данными).
# Образы по умолчанию собираются локально; для прода задать image с тегом из ghcr.io.
# Прод с внешней БД: задать DATABASE_URL и запускать только api и bot: docker compose up api bot.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://control_habits:control_habits@db:5432/control_habits}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://control_habits:control_habits@db:5432/control_habits}
      BOT_TOKEN: ${BOT_TOKEN}
      WEB_APP_URL: ${WEB_APP_URL:-}
      BOT_USERNAME: ${BOT_USERNAME:-}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: control_habits
      POSTGRES_PASSWORD: control_habits
      POSTGRES_DB: control_habits
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_habits"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
